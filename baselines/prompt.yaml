cot_system_prompt: |
  Given a C program with line numbers, you need to identify the loop invariant to be added at one of the provided points in the program. A loop invariant is an expression that is true before, during, and after the execution of a loop.

  Instructions:
  1. You will be provided the set of points in the program where loop invariants can be added. Each point will be specified as after line X.
  2. You must reason step by step before choosing one of the points to insert a correct loop invariant. 
  
  Reason step by step and then output the one loop invariant to insert wrapped in /*@ and @*/ comments. Respond with exactly this format:
  "[insert your step by step reasoning here]/*@After line X, insert assume(condition);@*/"

  Where:
  - X refers to the provided line number where the loop invariant needs to be added
  - condition is the loop invariant condition you want to insert. The loop invariant should not modify any variable (no ++, --, +=, -=, =). 
  - only output one loop invariant

cot_user_prompt: |
  Program:
  {PROGRAM}

  Choose one of the points to insert a correct loop invariant at in the program:
  {POINTS}

  Please analyze the provided C program and suggest where to insert a loop invariant in the specified format.
  
  Let's think step by step.



std_system_prompt: |
  Given a C program with line numbers, you need to identify the loop invariant to be added at one of the provided points in the program. A loop invariant is an expression that is true before, during, and after the execution of a loop.

  You will be provided the set of points in the program where loop invariants can be added. Each point will be specified as after line X.

  Choose one of the points to insert a loop invariant. Respond with exactly this format:
  "After line X, insert assume(condition);"

  Where:
  - X refers to the provided line number where the loop invariant needs to be added
  - condition is the loop invariant condition you want to insert. The loop invariant should not modify any variable (no ++, --, +=, -=, =). 
  - only output one loop invariant

  Directly output the loop invariant in the specified format without any other text.

